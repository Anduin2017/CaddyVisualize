version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native client
    environment:
      - CLICKHOUSE_DB=logs
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=123456
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - caddy_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - TZ=UTC
      - GF_SERVER_ROOT_URL=https://grafana.aiursoft.cn
      
      # === 插件安装 ===
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      
      # === OIDC 配置 ===
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Authentik
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=<YOUR_CLIENT_ID>
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=<YOUR_CLIENT_SECRET>
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email groups
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.aiursoft.com/application/o/authorize/
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.aiursoft.com/application/o/token/
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.aiursoft.com/application/o/userinfo/
      - GF_AUTH_SIGNOUT_REDIRECT_URL=https://auth.aiursoft.com/application/o/grafana-cn/end-session/
      - GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH=groups
      - "GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups, 'grafana-admins') && 'Admin' || contains(groups, 'grafana-editors') && 'Editor' || 'Viewer'"
      
      # === 其他配置 ===
      - GF_AUTH_GENERIC_ALLOW_ASSIGN_GRAFANA_ADMIN=true
      - GF_AUTH_GENERIC_ROLE_ATTRIBUTE_STRICT=true
      - GF_AUTH_OAUTH_AUTO_LOGIN=true
      - GF_PLUGINS_PLUGIN_ADMIN_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - clickhouse
    networks:
      - caddy_network

volumes:
  clickhouse_data:
  grafana_data:

networks:
  caddy_network:
    driver: bridge
